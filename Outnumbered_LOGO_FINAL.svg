<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0d0d0d"/>

  <!-- 4 vertical lines, scaled up, centered at x=540 -->
  <line x1="454" y1="284" x2="454" y2="482" stroke="#e8c547" stroke-width="19" stroke-linecap="round"/>
  <line x1="516" y1="260" x2="516" y2="458" stroke="#e8c547" stroke-width="19" stroke-linecap="round"/>
  <line x1="578" y1="236" x2="578" y2="434" stroke="#e8c547" stroke-width="19" stroke-linecap="round"/>
  <line x1="640" y1="212" x2="640" y2="410" stroke="#e8c547" stroke-width="19" stroke-linecap="round"/>

  <!-- Diagonal slash -->
  <line x1="378" y1="456" x2="716" y2="242" stroke="#e8c547" stroke-width="19" stroke-linecap="round"/>

  <!-- Oval tilted -18deg, centered at 540,343 -->
  <ellipse cx="540" cy="343" rx="324" ry="164"
    fill="none" stroke="#e8c547" stroke-width="12"
    transform="rotate(-18, 540, 343)"/>

  <!-- Wordmark -->
  <text x="540" y="672"
    text-anchor="middle"
    font-family="'Lexend', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="52" font-weight="700" letter-spacing="34"
    fill="#e8c547">OUTNUMBERED</text>

  <!-- Tagline -->
  <text x="540" y="730"
    text-anchor="middle"
    font-family="'Lexend', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="24" font-weight="300" letter-spacing="20"
    fill="#e8c547">SINCE MMXXVI</text>

</svg>
